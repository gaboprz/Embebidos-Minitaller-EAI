[Service]
# Limpiar el ExecStart original es obligatorio antes de redefinirlo.
# Sin esta línea en blanco, systemd acumularía ambos comandos.
ExecStart=
ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM

# Type=idle hace que systemd espere a terminar de arrancar todos los
# demás servicios antes de mostrar el prompt, evitando que los mensajes
# del boot se mezclen con la sesión de login.
Type=idle
