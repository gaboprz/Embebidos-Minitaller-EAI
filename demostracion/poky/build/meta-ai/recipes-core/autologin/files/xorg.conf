# ================================================================
#  /etc/X11/xorg.conf — Raspberry Pi 5
#
#  Configura X.Org para usar el driver modesetting con el
#  dispositivo DRM /dev/dri/card0 del GPU VideoCore VI.
#
#  SIN este archivo (o con uno incorrecto), X intenta autodetectar
#  y puede elegir el modo framebuffer, que falla en RPi5 porque
#  el GPU ya está gestionado por el driver DRM del kernel
#  (overlay vc4-kms-v3d-pi5).
#
#  NO se especifica BusID porque modesetting lo detecta
#  automáticamente desde DRM. No se usa xf86-video-fbdev.
# ================================================================

Section "Device"
    Identifier  "RPi5 VideoCore VI"
    Driver      "modesetting"
    # Apunta explícitamente al nodo DRM del GPU.
    # En RPi5 siempre es card0. Si tuvieras un segundo GPU, sería card1.
    Option      "kmsdev"       "/dev/dri/card0"
    # Desactiva aceleración de renderizado por software que puede
    # interferir con el stack DRM en imágenes embebidas mínimas.
    Option      "AccelMethod"  "none"
EndSection

Section "Screen"
    Identifier  "Default Screen"
    Device      "RPi5 VideoCore VI"
    # Sin Monitor ni DefaultDepth: X usa los valores EDID del display.
    # En pantallas sin EDID (displays serie/VGA simples) puedes
    # agregar: DefaultDepth 24
EndSection
