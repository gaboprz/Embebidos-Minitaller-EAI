MACHINE = "raspberrypi5"
DISTRO = "poky"
PACKAGE_CLASSES = "package_ipk"

DISTRO_FEATURES:append = " systemd"
DISTRO_FEATURES:append = " usrmerge"
DISTRO_FEATURES:append = " wifi"
VIRTUAL-RUNTIME_init_manager = "systemd"
DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"

DEFAULT_TIMEZONE = "America/Costa_Rica"

RPI_USE_U_BOOT = "0"
ENABLE_UART = "1"
ENABLE_SPI_BUS = "1"
ENABLE_I2C = "1"

EXTRA_IMAGE_FEATURES += " \
    empty-root-password \
    ssh-server-openssh \
    allow-empty-password \
"

IMAGE_INSTALL:append = " \
    dhcpcd \
    iproute2 \
    iputils \
    net-tools \
"

IMAGE_INSTALL:append = " tzdata"

# Paquetes WiFi:
# linux-firmware-rpiwifi: firmware del chip WiFi CYW43455 del RPi5.
#   Sin este paquete la interfaz wlan0 nunca aparece en el sistema.
# wpa-supplicant: demonio que gestiona la autenticación WPA/WPA2.
#   Lee /etc/wpa_supplicant/wpa_supplicant-wlan0.conf al arrancar.
IMAGE_INSTALL:append = " \
    linux-firmware \
    wpa-supplicant \
"

IMAGE_INSTALL:append = " \
    bash \
    vim \
    htop \
    procps \
    coreutils \
"

IMAGE_INSTALL:append = " ollama ca-certificates libstdc++ libgcc libgomp numactl"

IMAGE_FSTYPES = "wic.bz2"
IMAGE_ROOTFS_EXTRA_SPACE = "8388608"
LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch commercial"

BB_NUMBER_PARSE_THREADS = "2"
BB_NUMBER_THREADS = "4"
PARALLEL_MAKE = "-j 4"

DL_DIR ?= "${TOPDIR}/../downloads"
SSTATE_DIR ?= "${TOPDIR}/../sstate-cache"
TMPDIR = "${TOPDIR}/tmp"

CONF_VERSION = "2"

INHERIT:remove = "create-spdx"
