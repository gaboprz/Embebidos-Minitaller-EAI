# ================================================================
#  local.conf — Yocto Scarthgap | Raspberry Pi 5
# ================================================================

# ----------------------------------------------------------------
# 1. MÁQUINA Y DISTRIBUCIÓN
# ----------------------------------------------------------------
MACHINE = "raspberrypi5"
DISTRO = "poky"
PACKAGE_CLASSES = "package_ipk"

# ----------------------------------------------------------------
# 2. SISTEMA DE INIT: systemd
# ----------------------------------------------------------------
DISTRO_FEATURES:append = " systemd"
DISTRO_FEATURES:append = " usrmerge"
VIRTUAL-RUNTIME_init_manager = "systemd"
DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"

# ----------------------------------------------------------------
# 3. CARACTERÍSTICAS DE LA DISTRO Y HARDWARE
# ----------------------------------------------------------------
DISTRO_FEATURES:append = " x11"
GPU_MEM = "128"
ENABLE_UART = "1"
MACHINE_FEATURES:append = " vc4graphics"

# ----------------------------------------------------------------
# 4. IMAGE FEATURES
# ----------------------------------------------------------------
EXTRA_IMAGE_FEATURES += " \
    empty-root-password \
    ssh-server-openssh \
    allow-empty-password \
"

# ----------------------------------------------------------------
# 5. PAQUETES — INTERFAZ GRÁFICA X11 + Matchbox WM
# ----------------------------------------------------------------
IMAGE_INSTALL:append = " \
    xserver-xorg \
    xf86-video-modesetting \
    xf86-input-evdev \
    xf86-input-libinput \
    matchbox-wm \
    xterm \
    xinit \
    xauth \
    xrandr \
"

# ----------------------------------------------------------------
# 6. PAQUETES — RED Y CONECTIVIDAD
# ----------------------------------------------------------------
IMAGE_INSTALL:append = " \
    dhcpcd \
    iproute2 \
    iputils \
    net-tools \
"

# ----------------------------------------------------------------
# 7. PAQUETES — UTILITARIOS
# ----------------------------------------------------------------
IMAGE_INSTALL:append = " \
    bash \
    vim \
    htop \
    procps \
    coreutils \
"

# ----------------------------------------------------------------
# 8. RASPBERRY PI — CONFIGURACIÓN ESPECÍFICA
# ----------------------------------------------------------------
RPI_USE_U_BOOT = "0"
ENABLE_SPI_BUS = "1"
ENABLE_I2C = "1"

# vc4-kms-v3d-pi5: driver DRM/KMS del GPU VideoCore VI del RPi5.
# cma-512: 512MB de memoria contigua para el GPU (necesario para X11).
#
# ELIMINADO intencionalmente: numa=fake=8 y system_heap.max_order=0
# Esos parámetros causan que llama.cpp no pueda asignar el bloque
# de ~1.6GB necesario para cargar gemma2:2b, produciendo el error -1.
RPI_EXTRA_CONFIG:append = "\ndtoverlay=vc4-kms-v3d-pi5,cma-512\n"

# ----------------------------------------------------------------
# 9. PAQUETES — OLLAMA Y LLM
# ----------------------------------------------------------------
IMAGE_INSTALL:append = " ollama ca-certificates libstdc++ libgcc libgomp numactl"

# ----------------------------------------------------------------
# 10. ALMACENAMIENTO Y LICENCIAS
# ----------------------------------------------------------------
IMAGE_FSTYPES = "wic.bz2"

# Espacio extra para los modelos de Ollama.
# gemma2:2b = ~1.6GB. 6GB extra da margen holgado.
# Unidad: KB. 6291456 KB = 6 GB
IMAGE_ROOTFS_EXTRA_SPACE = "6291456"

LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch commercial"

# ----------------------------------------------------------------
# 11. RENDIMIENTO DE COMPILACIÓN
# ----------------------------------------------------------------
BB_NUMBER_PARSE_THREADS = "2"
BB_NUMBER_THREADS = "4"
PARALLEL_MAKE = "-j 4"

# ----------------------------------------------------------------
# 12. DIRECTORIOS DE CACHÉ
# ----------------------------------------------------------------
DL_DIR ?= "${TOPDIR}/../downloads"
SSTATE_DIR ?= "${TOPDIR}/../sstate-cache"
TMPDIR = "${TOPDIR}/tmp"

CONF_VERSION = "2"

# ----------------------------------------------------------------
# 13. FIXES DE BUILD
# ----------------------------------------------------------------
INHERIT:remove = "create-spdx"
PACKAGECONFIG:remove:pn-xterm = "desktop-utils"
