# ================================================================
#  local.conf — Yocto Scarthgap | Raspberry Pi 5 | Solo consola
# ================================================================

# ----------------------------------------------------------------
# 1. MÁQUINA Y DISTRIBUCIÓN
# ----------------------------------------------------------------
MACHINE = "raspberrypi5"
DISTRO = "poky"
PACKAGE_CLASSES = "package_ipk"

# ----------------------------------------------------------------
# 2. SISTEMA DE INIT: systemd
# ----------------------------------------------------------------
DISTRO_FEATURES:append = " systemd"
DISTRO_FEATURES:append = " usrmerge"
VIRTUAL-RUNTIME_init_manager = "systemd"
DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"

# ----------------------------------------------------------------
# 3. ZONA HORARIA
# ----------------------------------------------------------------
# Establece la zona horaria de Costa Rica (UTC-6, sin horario de verano).
# DEFAULT_TIMEZONE es una variable nativa de Yocto: instala tzdata
# y crea el enlace simbólico /etc/localtime automáticamente durante el build.
# Sin esto, la imagen arranca en UTC y los logs y timestamps del sistema
# muestran la hora incorrecta para Costa Rica.
DEFAULT_TIMEZONE = "America/Costa_Rica"

# ----------------------------------------------------------------
# 4. HARDWARE — RASPBERRY PI
# ----------------------------------------------------------------
RPI_USE_U_BOOT = "0"
ENABLE_UART = "1"
ENABLE_SPI_BUS = "1"
ENABLE_I2C = "1"

# ----------------------------------------------------------------
# 5. IMAGE FEATURES
# ----------------------------------------------------------------
EXTRA_IMAGE_FEATURES += " \
    empty-root-password \
    ssh-server-openssh \
    allow-empty-password \
"

# ----------------------------------------------------------------
# 6. PAQUETES — RED Y CONECTIVIDAD
# ----------------------------------------------------------------
IMAGE_INSTALL:append = " \
    dhcpcd \
    iproute2 \
    iputils \
    net-tools \
"

# ----------------------------------------------------------------
# 7. PAQUETES — TIEMPO Y SINCRONIZACIÓN NTP
# ----------------------------------------------------------------
# tzdata: base de datos de zonas horarias, requerida por DEFAULT_TIMEZONE
# systemd-timesyncd ya viene dentro del paquete systemd, no se pide por separado
IMAGE_INSTALL:append = " tzdata"

# ----------------------------------------------------------------
# 8. PAQUETES — UTILITARIOS
# ----------------------------------------------------------------
IMAGE_INSTALL:append = " \
    bash \
    vim \
    htop \
    procps \
    coreutils \
"

# ----------------------------------------------------------------
# 9. PAQUETES — OLLAMA Y LLM
# ----------------------------------------------------------------
IMAGE_INSTALL:append = " ollama ca-certificates libstdc++ libgcc libgomp numactl"

# ----------------------------------------------------------------
# 10. ALMACENAMIENTO Y LICENCIAS
# ----------------------------------------------------------------
IMAGE_FSTYPES = "wic.bz2"
IMAGE_ROOTFS_EXTRA_SPACE = "6291456"
LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch commercial"

# ----------------------------------------------------------------
# 11. RENDIMIENTO DE COMPILACIÓN
# ----------------------------------------------------------------
BB_NUMBER_PARSE_THREADS = "2"
BB_NUMBER_THREADS = "4"
PARALLEL_MAKE = "-j 4"

# ----------------------------------------------------------------
# 12. DIRECTORIOS DE CACHÉ
# ----------------------------------------------------------------
DL_DIR ?= "${TOPDIR}/../downloads"
SSTATE_DIR ?= "${TOPDIR}/../sstate-cache"
TMPDIR = "${TOPDIR}/tmp"

CONF_VERSION = "2"

# ----------------------------------------------------------------
# 13. FIXES DE BUILD
# ----------------------------------------------------------------
INHERIT:remove = "create-spdx"
