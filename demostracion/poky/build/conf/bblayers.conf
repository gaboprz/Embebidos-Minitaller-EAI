  /home/yoctouser/yocto-workspace/poky/meta-raspberrypi \
  /home/yoctouser/yocto-workspace/poky/meta-openembedded/meta-oe \
  /home/yoctouser/yocto-workspace/poky/meta-openembedded/meta-python \
  /home/yoctouser/yocto-workspace/poky/meta-openembedded/meta-networking \
  /home/yoctouser/yocto-workspace/poky/meta-openembedded/meta-multimedia \
  /home/yoctouser/yocto-workspace/poky/build/meta-ai \
  "
